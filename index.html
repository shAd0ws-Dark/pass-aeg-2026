<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pass Officiel AEG26</title>
    <style>
        :root { --primary: #2e7d32; --text: #000; --gray: #888; }
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #1a1a1a; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        
        /* Structure du billet */
        .ticket { 
            width: 350px; height: 500px; background-color: #fff; position: relative; 
            border-radius: 15px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        /* En-tête (Logo et Titre) */
        .header { height: 110px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 2px dashed #eee; position: relative; }
        .logo { font-size: 32px; font-weight: 900; color: var(--primary); margin: 0; letter-spacing: 2px; }
        .slogan { font-size: 10px; color: var(--gray); letter-spacing: 3px; text-transform: uppercase; margin-top: 5px; }

        /* Décorations (Coins pointillés) */
        .corner { position: absolute; width: 15px; height: 15px; border: 2px dashed #ccc; }
        .tl { top: 15px; left: 15px; border-right: 0; border-bottom: 0; }
        .br { bottom: 15px; right: 15px; border-left: 0; border-top: 0; }

        /* Icônes de voyage (Générées en CSS/Emoji) */
        .travel-icon { position: absolute; left: 30px; top: 140px; font-size: 50px; opacity: 0.1; transform: rotate(-15deg); }
        .airplane-icon { position: absolute; bottom: 30px; left: 30px; font-size: 40px; opacity: 0.2; }

        /* Zone d'informations (Alignée à droite comme sur l'image) */
        .info-container { position: absolute; top: 215px; right: 25px; width: 160px; display: flex; flex-direction: column; gap: 15px; }
        .field { border-bottom: 1.5px solid #eee; padding-bottom: 5px; }
        .label { font-size: 8px; color: var(--gray); font-weight: bold; text-transform: uppercase; margin-bottom: 3px; }
        .value { font-size: 11px; color: var(--text); font-weight: 800; text-transform: uppercase; }

        /* Zone QR Code */
        .qr-section { position: absolute; bottom: 30px; right: 25px; text-align: center; }
        .qr-section img { width: 75px; height: 75px; border: 1px solid #eee; padding: 5px; border-radius: 5px; }
        .qr-label { font-size: 6px; color: var(--gray); margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="ticket">
    <div class="corner tl"></div>
    <div class="header">
        <h1 class="logo">AEG</h1>
        <div class="slogan">Solidarité • Égalité</div>
    </div>

    <div class="travel-icon">🧳</div>
    <div class="airplane-icon">✈️</div>

    <div class="info-container">
        <div class="field">
            <div class="label">Bon pour :</div>
            <div id="display-name" class="value">Chargement...</div>
        </div>
        <div class="field">
            <div class="label">Destination :</div>
            <div class="value">Mbour, Saly</div>
        </div>
        <div class="field">
            <div class="label">Événement :</div>
            <div class="value">WEI AEG26</div>
        </div>
        <div class="field">
            <div class="label">Date :</div>
            <div class="value">10-12 Avril 2026</div>
        </div>
    </div>

    <div class="qr-section">
        <img id="qr-code" alt="QR Code">
        <div class="qr-label">#AEG-2026-CONFIRMED</div>
    </div>
    <div class="corner br"></div>
</div>

<script>
    // Récupération dynamique depuis Google Sheets
    const params = new URLSearchParams(window.location.search);
    const nom = params.get('nom') || "INVITÉ";
    const prenoms = params.get('prenoms') || "";
    const nomComplet = (prenoms + " " + nom).trim();

    // Mise à jour du texte
    document.getElementById('display-name').innerText = nomComplet;

    // Génération du QR Code
    const qrData = encodeURIComponent("AEG26-" + nomComplet);
    document.getElementById('qr-code').src = `https://quickchart.io/qr?text=${qrData}&size=150&margin=1`;
</script>

</body>
</html>
