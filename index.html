<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billet Officiel WEI AEG26</title>
    <style>
        body { 
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; 
            height: 100vh; background-color: #1a1a1a; font-family: 'Courier New', Courier, monospace; 
        }
        
        .ticket { 
            width: 350px; height: 495px; 
            background-image: url('https://i.imgur.com/0uzPqhy.png'); 
            background-size: 100% 100%; position: relative; border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        /* Conteneur des textes aligné sur la droite */
        .data-container {
            position: absolute;
            top: 218px; /* Position de la première ligne */
            right: 15px;
            width: 160px; /* Zone des lignes */
            display: flex;
            flex-direction: column;
        }

        .item {
            height: 48px; /* Distance exacte entre deux lignes noires */
            display: flex;
            align-items: center;
            font-weight: 900;
            font-size: 0.8em;
            color: #000;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* QR Code stylé sans bordure blanche inutile */
        .qr-zone {
            position: absolute;
            bottom: 22px;
            right: 22px;
            mix-blend-mode: multiply; /* Fusionne le QR avec le fond */
        }
        .qr-zone img { width: 62px; height: 62px; display: block; opacity: 0.9; }

    </style>
</head>
<body>

<div class="ticket">
    <div class="data-container">
        <div id="name" class="item">CHARGEMENT...</div>
        <div class="item">MBOUR, SALY</div>
        <div class="item">WEI AEG26</div>
        <div class="item">10-12 AVRIL</div>
    </div>

    <div class="qr-zone">
        <img id="qr" src="" alt="QR">
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const nom = urlParams.get('nom') || "INVITÉ";
    const prenoms = urlParams.get('prenoms') || "";
    
    document.getElementById('name').innerText = prenoms + " " + nom;
    
    const qrText = encodeURIComponent("AEG26-" + nom + "-" + prenoms);
    // QR Code généré en haute résolution
    document.getElementById('qr').src = `https://quickchart.io/qr?text=${qrText}&size=150&margin=0`;
</script>

</body>
</html>
