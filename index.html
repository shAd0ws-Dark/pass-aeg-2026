<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pass Officiel AEG26 • Premium</title>
    <style>
        :root { --p: #2e7d32; --t: #000; --g: #888; }
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #121212; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; overflow: hidden; }
        
        /* Conteneur principal avec ombre portée et texture subtile */
        .ticket { 
            width: 360px; height: 510px; background-color: #fff; position: relative; 
            border-radius: 18px; overflow: hidden; box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            /* Ajout d'une texture papier subtile en pur CSS */
            background-image: linear-gradient(0deg, #fff 0%, #fff 70%, #f9f9f9 100%);
        }

        /* En-tête : Zone Logo avec dégradé subtil */
        .header { height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 2px dashed #eee; position: relative; background: linear-gradient(135deg, #fdfdfd 0%, #f9f9f9 100%); }
        .logo-box { text-align: center; }
        .logo { font-size: 38px; font-weight: 900; color: var(--p); margin: 0; letter-spacing: 3px; text-shadow: 0 1px 0 rgba(0,0,0,0.1); }
        .slogan { font-size: 11px; color: var(--g); letter-spacing: 3px; text-transform: uppercase; margin-top: 5px; font-weight: 300; }

        /* Décorations : Coins pointillés avec effet "métal" */
        .corner { position: absolute; width: 18px; height: 18px; border: 2.5px dashed #ccc; filter: drop-shadow(0 1px 0 #fff); }
        .tl { top: 18px; left: 18px; border-right: 0; border-bottom: 0; }
        .br { bottom: 18px; right: 18px; border-left: 0; border-top: 0; }

        /* Icônes de voyage (Générées en CSS/Emoji avec opacité dynamique) */
        .deco-icon { position: absolute; left: 35px; top: 150px; font-size: 60px; opacity: 0.12; transform: rotate(-10deg); filter: blur(0.5px); }
        .airplane-deco { position: absolute; bottom: 35px; left: 35px; font-size: 50px; opacity: 0.25; filter: blur(0.5px); }

        /* Zone d'informations (Alignée à droite comme sur l'image) */
        .info-container { position: absolute; top: 230px; right: 28px; width: 170px; display: flex; flex-direction: column; gap: 16px; }
        .field { border-bottom: 1.5px solid #eee; padding-bottom: 6px; }
        .label { font-size: 9px; color: var(--g); font-weight: bold; text-transform: uppercase; margin-bottom: 4px; letter-spacing: 0.5px; }
        .value { font-size: 12px; color: var(--t); font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Zone QR Code avec effet de badge */
        .qr-section { position: absolute; bottom: 35px; right: 28px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .qr-box { background: #fff; border: 1.5px solid #eee; padding: 7px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .qr-box img { width: 80px; height: 80px; border-radius: 5px; }
        .qr-label { font-size: 7px; color: var(--g); margin-top: 6px; font-weight: bold; letter-spacing: 0.5px; text-transform: uppercase; }
        
        /* Numéro unique discret et élégant */
        .unique-id { position: absolute; top: 10px; right: 10px; font-size: 6px; color: #ddd; font-family: monospace; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="ticket">
    <div class="unique-id">#AEG-2026-PREMIUM</div>
    <div class="corner tl"></div>
    <div class="header">
        <div class="logo-box">
            <h1 class="logo">AEG</h1>
            <div class="slogan">Solidarité • Égalité</div>
        </div>
    </div>

    <div class="deco-icon">🧳</div>
    <div class="airplane-deco">✈️</div>

    <div class="info-container">
        <div class="field">
            <div class="label">Bon pour :</div>
            <div id="display-name" class="value">Chargement...</div>
        </div>
        <div class="field">
            <div class="label">Destination :</div>
            <div class="value">Mbour, Saly</div>
        </div>
        <div class="field">
            <div class="label">Événement :</div>
            <div class="value">WEI AEG26</div>
        </div>
        <div class="field">
            <div class="label">Date :</div>
            <div class="value">10-12 Avril 2026</div>
        </div>
    </div>

    <div class="qr-section">
        <div class="qr-box">
            <img id="qr-code" alt="QR Code">
        </div>
        <div class="qr-label">SCAN POUR VÉRIFIER</div>
    </div>
    <div class="corner br"></div>
</div>

<script>
    // Récupération dynamique depuis Google Sheets
    const params = new URLSearchParams(window.location.search);
    const nom = params.get('nom') || "INVITÉ";
    const prenoms = params.get('prenoms') || "";
    const nomComplet = (prenoms + " " + nom).trim();

    // Mise à jour du texte
    document.getElementById('display-name').innerText = nomComplet;

    // Génération du QR Code net et ultra-pro
    const qrData = encodeURIComponent("AEG26-" + nomComplet);
    document.getElementById('qr-code').src = `https://quickchart.io/qr?text=${qrData}&size=150&margin=1`;
</script>

</body>
</html>
