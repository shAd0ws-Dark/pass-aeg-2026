<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Souvenir WEI 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Fira+Code:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --aeg-green: #10b981;
            --aeg-gold: #fbbf24;
            --bg: #020617;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; overflow: hidden;
        }

        /* Fond animé avec particules de lumière */
        .ambient-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #1e293b 0%, #020617 100%);
            z-index: -1;
        }
        
        .glow-orb {
            position: absolute; width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.15) 0%, transparent 70%);
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(20%, 20%); }
        }

        /* La Carte avec bordure animée */
        .card-container {
            position: relative;
            width: 340px;
            padding: 3px;
            border-radius: 30px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.05);
        }

        .card-container::before {
            content: '';
            position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, var(--aeg-green), transparent, var(--aeg-gold), transparent);
            animation: rotate 4s linear infinite;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .card-inner {
            background: #0f172a;
            border-radius: 28px;
            padding: 40px 25px;
            position: relative;
            text-align: center;
            backdrop-filter: blur(20px);
        }

        /* Contenu */
        .logo-aeg { font-family: 'Fira Code', monospace; font-size: 0.7rem; color: var(--aeg-green); letter-spacing: 3px; margin-bottom: 20px; }
        
        h1 { 
            font-size: 48px; font-weight: 800; margin: 0;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .user-name {
            display: block; font-size: 26px; font-weight: 800;
            color: var(--aeg-gold); margin: 20px 0;
            opacity: 0; animation: fadeInUp 1s forwards 0.5s;
        }

        .message { color: #94a3b8; font-size: 14px; line-height: 1.6; }

        .badge-status {
            margin-top: 30px; padding: 10px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            border-radius: 12px; color: var(--aeg-green);
            font-weight: 700; font-size: 0.8rem;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="ambient-bg">
    <div class="glow-orb"></div>
</div>

<div class="card-container">
    <div class="card-inner">
        <div class="logo-aeg">AEG // MISSION COMPLETED</div>
        <h1>MERCI</h1>
        <span id="name" class="user-name">...</span>
        <p class="message">Ton énergie a fait vibrer le WEI 2026. On garde ces souvenirs précieusement.</p>
        
        <div class="badge-status">
            ✨ INVITÉ D'HONNEUR RECONNU ✨
        </div>
        
        <p style="font-size: 10px; color: #475569; margin-top: 25px; font-family: 'Fira Code';">
            ID: #WEI2026-REG-SUCCESS
        </p>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const nom = urlParams.get('nom') || "Aventurier";
    const prenom = urlParams.get('prenom') || "";
    document.getElementById('name').innerText = (prenom + " " + nom).toUpperCase();
</script>

</body>
</html>
