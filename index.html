<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pass Officiel WEI AEG26</title>
    <style>
        body { 
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; 
            height: 100vh; background-color: #222; font-family: 'Helvetica Neue', Arial, sans-serif; 
        }
        
        .ticket { 
            width: 350px; height: 495px; 
            background-image: url('https://i.imgur.com/0uzPqhy.png'); 
            background-size: 100% 100%; position: relative; border-radius: 10px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            background-color: white;
        }

        /* Zone d'écriture à droite */
        .info-zone {
            position: absolute;
            top: 200px; /* Aligné sur le milieu du billet */
            right: 20px;
            width: 155px;
            display: flex;
            flex-direction: column;
            gap: 15px; /* Espace entre les blocs d'info */
        }

        .info-block {
            border-bottom: 1px solid #e0e0e0;
            padding-bottom: 2px;
        }

        .label {
            font-size: 0.65em;
            color: #888;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .value {
            font-size: 0.85em;
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* QR Code avec un petit effet de badge */
        .qr-area {
            position: absolute;
            bottom: 22px;
            right: 22px;
            text-align: center;
        }

        .qr-area img {
            width: 70px;
            height: 70px;
            background: white;
            padding: 3px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }

        .id-ticket {
            font-size: 0.5em;
            color: #bbb;
            margin-top: 5px;
            font-family: monospace;
        }
    </style>
</head>
<body>

<div class="ticket">
    <div class="info-zone">
        <div class="info-block">
            <div class="label">Bon pour :</div>
            <div id="name" class="value">Chargement...</div>
        </div>
        <div class="info-block">
            <div class="label">Destination :</div>
            <div class="value">Mbour, Saly</div>
        </div>
        <div class="info-block">
            <div class="label">Événement :</div>
            <div class="value">WEI AEG26</div>
        </div>
        <div class="info-block">
            <div class="label">Date :</div>
            <div class="value">10-12 Avril 2026</div>
        </div>
    </div>

    <div class="qr-area">
        <img id="qr" src="" alt="Vérification">
        <div class="id-ticket">#AEG-2026-CONFIRMED</div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const nom = urlParams.get('nom') || "INVITÉ";
    const prenoms = urlParams.get('prenoms') || "";
    
    document.getElementById('name').innerText = prenoms + " " + nom;
    
    // QR Code ultra-net
    const qrText = encodeURIComponent("AEG-PASS-" + nom + "-" + prenoms);
    document.getElementById('qr').src = `https://quickchart.io/qr?text=${qrText}&size=150&margin=1`;
</script>

</body>
</html>
