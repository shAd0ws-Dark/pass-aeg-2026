<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pass WEI AEG26</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #333; font-family: 'Courier New', Courier, monospace; }
        
        .pass-container { 
            width: 350px; height: 495px; 
            background-image: url('https://i.imgur.com/DGXx9kR.png'); 
            background-size: 100% 100%; position: relative; background-color: white; 
        }

        /* Conteneur invisible qui force le texte à droite */
        .right-side-content {
            position: absolute;
            top: 195px; /* Aligné sur "BON POUR:" */
            right: 15px;
            width: 155px; /* Largeur précise de la zone des lignes */
            display: flex;
            flex-direction: column;
        }

        .field-value {
            font-weight: bold;
            font-size: 0.75em;
            color: black;
            height: 48px; /* Hauteur exacte d'une ligne sur ton image */
            display: flex;
            align-items: center; /* Centre le texte verticalement sur la ligne */
            text-transform: uppercase;
            overflow: hidden;
        }

        .qr-zone {
            position: absolute;
            bottom: 25px;
            right: 25px;
            background: white;
            padding: 5px;
        }
        .qr-zone img { width: 60px; height: 60px; display: block; }
    </style>
</head>
<body>

<div class="pass-container">
    <div class="right-side-content">
        <span id="name" class="field-value">Chargement...</span>
        <span class="field-value">SALY, COCO-BEACH</span>
        <span class="field-value">LE WEI AEG26</span>
        <span class="field-value">10-12 AVRIL</span>
    </div>

    <div class="qr-zone">
        <img id="qr" src="" alt="QR">
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const nom = params.get('nom') || "INVITE";
    const prenoms = params.get('prenoms') || "";
    document.getElementById('name').innerText = prenoms + " " + nom;

    const qrText = encodeURIComponent("AEG-2026-" + nom);
    document.getElementById('qr').src = `https://quickchart.io/qr?text=${qrText}&size=100`;
</script>

</body>
</html>
