<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billet Officiel WEI AEG26</title>
    <style>
        body { 
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; 
            height: 100vh; background-color: #1a1a1a; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
        }
        
        .ticket { 
            width: 350px; height: 495px; 
            /* On utilise l'image sans les textes de droite si possible */
            background-image: url('https://i.imgur.com/0uzPqhy.png'); 
            background-size: 100% 100%; position: relative; border-radius: 12px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            background-color: white;
        }

        /* Zone de texte à droite */
        .info-zone {
            position: absolute;
            top: 200px;
            right: 20px;
            width: 160px;
            display: flex;
            flex-direction: column;
            gap: 18px; /* Espacement entre les blocs */
        }

        .block {
            display: flex;
            flex-direction: column;
            border-bottom: 1px solid #eee; /* Petite ligne de séparation stylée */
            padding-bottom: 4px;
        }

        .label {
            font-size: 0.6em;
            color: #666;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .value {
            font-size: 0.85em;
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
        }

        /* QR Code intégré au design */
        .qr-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            text-align: center;
        }

        .qr-container img {
            width: 70px;
            height: 70px;
            border: 1px solid #000;
            padding: 2px;
            background: white;
        }

        .security-tag {
            font-size: 0.5em;
            margin-top: 4px;
            color: #999;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="ticket">
    <div class="info-zone">
        <div class="block">
            <div class="label">Bon pour :</div>
            <div id="name" class="value">Chargement...</div>
        </div>
        <div class="block">
            <div class="label">Destination :</div>
            <div class="value">Mbour, Saly</div>
        </div>
        <div class="block">
            <div class="label">Événement :</div>
            <div class="value">WEI AEG26</div>
        </div>
        <div class="block">
            <div class="label">Date :</div>
            <div class="value">10-12 Avril 2026</div>
        </div>
    </div>

    <div class="qr-container">
        <img id="qr" src="" alt="QR">
        <div class="security-tag">SCAN POUR VÉRIFIER</div>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const nom = urlParams.get('nom') || "INVITÉ";
    const prenoms = urlParams.get('prenoms') || "";
    
    document.getElementById('name').innerText = prenoms + " " + nom;
    
    const qrText = encodeURIComponent("AEG26-OFFICIEL-" + nom);
    document.getElementById('qr').src = `https://quickchart.io/qr?text=${qrText}&size=150&centerImageUrl=https://i.imgur.com/8K5mK8X.png`;
</script>

</body>
</html>
