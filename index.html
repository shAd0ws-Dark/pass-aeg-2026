<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merci - WEI AEG 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --aeg-green: #2e7d32;
            --aeg-gold: #ffd700;
            --bg: #0d1117;
            --card-bg: #161b22;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--bg);
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            color: white;
        }

        .thank-you-card {
            width: 350px;
            background: var(--card-bg);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        /* Effet de brillance festif */
        .thank-you-card::before {
            content: '';
            position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(46, 125, 50, 0.1) 0%, transparent 70%);
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .header {
            background: var(--aeg-green);
            padding: 40px 20px;
            position: relative;
        }

        .header h1 { margin: 0; font-size: 24px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }

        .content { padding: 30px; position: relative; }
        
        .user-name {
            font-size: 28px;
            color: var(--aeg-gold);
            font-weight: 800;
            margin: 10px 0;
            display: block;
        }

        .message {
            font-size: 16px;
            line-height: 1.5;
            color: #94a3b8;
            margin-bottom: 25px;
        }

        .stats-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 15px; border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        .stat-box span { display: block; }
        .stat-label { font-size: 10px; color: #64748b; text-transform: uppercase; font-weight: 700; }
        .stat-val { font-size: 18px; font-weight: 800; color: white; }

        .footer-logo {
            margin-top: 30px;
            font-weight: 800;
            font-size: 14px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<div class="thank-you-card">
    <div class="header">
        <h1>MERCI !</h1>
        <p style="font-size: 12px; margin-top: 5px; opacity: 0.8;">WEI AEG 2026 • FIN DE MISSION</p>
    </div>

    <div class="content">
        <p class="message">L'ambiance était incroyable grâce à toi,</p>
        <span id="name" class="user-name">CHARGEMENT...</span>
        <p class="message">Tu as fait partie de cette aventure légendaire. On se retrouve très vite pour la suite !</p>

        <div class="stats-grid">
            <div class="stat-box">
                <span class="stat-label">Statut</span>
                <span class="stat-val">MEMBRE ÉLITE</span>
            </div>
            <div class="stat-box">
                <span class="stat-label">Ambiance</span>
                <span class="stat-val">100% FEU</span>
            </div>
        </div>

        <div class="footer-logo">AEG // SOLIDARITÉ • ÉGALITÉ</div>
    </div>
</div>

<script>
    // Récupération dynamique du nom via l'URL (même système que pour le badge)
    const urlParams = new URLSearchParams(window.location.search);
    const nom = urlParams.get('nom') || "CHAMPION";
    const prenoms = urlParams.get('prenoms') || "";
    document.getElementById('name').innerText = (prenoms + " " + nom).toUpperCase();
</script>

</body>
</html>
