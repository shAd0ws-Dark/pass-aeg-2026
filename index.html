<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pass WEI AEG26 - Officiel</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            /* Police pour le thème voyage */
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            overflow: hidden;
        }

        .ticket-pass {
            width: 350px; /* Taille optimale smartphone */
            height: 495px; /* Ratio standard d'une carte postale de ton modèle */
            /* TON IMAGE NETTOYEE EST ICI 👇 */
            background-image: url('URL_DE_TON_IMAGE_NETTOYEE_ICI');
            background-size: cover;
            position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            border-radius: 5px;
            overflow: hidden;
            background-color: white;
        }

        /* Overlay pour les infos dynamiques (en bas à droite) */
        .dynamic-fields {
            position: absolute;
            top: 200px; /* Aligné sur les champs de ton modèle */
            left: 50%; /* Aligné sur la colonne de droite */
            width: 45%;
            font-size: 0.85em;
            color: black;
            line-height: 2.2; /* Espacement calé sur tes lignes blanches */
        }

        .field-value {
            font-weight: bold;
            display: block;
            margin-bottom: 25px; /* Calage vertical précis pour chaque ligne */
            text-transform: uppercase;
        }

        /* Le QR Code de Vérification (discret, en bas à droite) */
        .qr-code-verification {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.9);
            padding: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .qr-code-verification img {
            width: 65px; /* Taille compacte */
            height: 65px;
            display: block;
        }
    </style>
</head>
<body>

<div class="ticket-pass">
    <div class="dynamic-fields">
        <span id="name" class="field-value">Chargement...</span> <span class="field-value">MBOUR, SALY</span> <span class="field-value">LE WEI AEG26</span> <span class="field-value">10-12 AVRIL</span> </div>

    <div class="qr-code-verification">
        <img id="qr" src="https://via.placeholder.com/65" alt="Vérification">
    </div>
</div>

<script>
    // Récupération des données depuis l'URL (GET parameters)
    const urlParams = new URLSearchParams(window.location.search);
    const nom = urlParams.get('nom') || "Invité";
    const prenoms = urlParams.get('prenoms') || "";
    
    // Mise à jour du nom de l'étudiant
    document.getElementById('name').innerText = prenoms + " " + nom;
    
    // Génération du QR code sécurisé (Bleu nuit AEG)
    const qrText = encodeURIComponent("WEI-AEG26-" + nom + "-" + prenoms + "-VALIDATED");
    const qrUrl = `https://quickchart.io/qr?text=${qrText}&dark=003366&size=100`;
    document.getElementById('qr').src = qrUrl;
</script>

</body>
</html>
